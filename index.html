<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBG Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: #1a56db; min-height: 100vh; padding: 1.5rem 1rem; display: flex; flex-direction: column; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; padding: 0 0.5rem; }
    .logo-icon { width: 34px; height: 34px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; fill: white; }
    .sidebar-logo span { font-size: 17px; font-weight: 600; color: white; }
    .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); padding: 0 0.75rem; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.75); font-size: 14px; transition: background 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.12); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.2); color: white; font-weight: 600; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { margin-top: auto; padding: 0.75rem; background: rgba(255,255,255,0.08); border-radius: 8px; }
    .sidebar-footer .label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
    .sidebar-footer .value { font-size: 13px; color: white; font-weight: 600; }

    /* TOPBAR */
    .topbar { background: white; border-bottom: 1px solid #e5e7eb; padding: 0.875rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-size: 15px; font-weight: 600; color: #111827; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #dbeafe; color: #1e40af; font-weight: 600; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.25rem; }
    .stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; }
    .stat-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; color: #111827; line-height: 1; }
    .stat-sub { font-size: 11px; color: #9ca3af; margin-top: 6px; }

    /* TABLE CARD */
    .table-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .table-toolbar { padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .search-wrap { display: flex; align-items: center; gap: 6px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 7px; padding: 0 10px; flex: 1; max-width: 240px; }
    .search-wrap input { border: none; background: transparent; font-size: 13px; color: #111827; outline: none; width: 100%; padding: 7px 0; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 0.45rem 0.875rem; border-radius: 7px; font-size: 13px; cursor: pointer; border: 1px solid #d1d5db; background: white; color: #374151; font-weight: 500; transition: all 0.15s; }
    .btn:hover { background: #f9fafb; }
    .btn-primary { background: #1a56db; color: white; border-color: #1a56db; }
    .btn-success { background: #059669; color: white; border-color: #059669; }
    .btn-danger { background: #dc2626; color: white; border-color: #dc2626; }
    .btn-toolbar { display: flex; gap: 6px; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { border-bottom: 1px solid #e5e7eb; background: #f9fafb; }
    th { text-align: left; padding: 0.6rem 1rem; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; }
    td { padding: 0.75rem 1rem; color: #374151; border-bottom: 1px solid #f3f4f6; }

    /* PAGINATION */
    .pagination { padding: 0.75rem 1rem; border-top: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
    .page-btns { display: flex; gap: 4px; }
    .page-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #e5e7eb; font-size: 12px; cursor: pointer; background: white; }
    .page-btn.active { background: #1a56db; color: white; border-color: #1a56db; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 14px; padding: 1.5rem; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; display: block; }
    .form-input { width: 100%; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 7px; padding: 0.55rem 0.75rem; font-size: 13px; outline: none; }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }

    /* PRINT OPTIMIZATION */
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
      .table-card { border: none; }
      main { padding: 0 !important; }
      table { border: 1px solid #eee; }
    }
  </style>
</head>
<body>

<div style="display:flex;">

  <aside class="sidebar no-print">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      </div>
      <span>MBG App</span>
    </div>

    <div class="nav-label">Menu</div>
    <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      Dashboard
    </div>
    <div class="nav-item" id="nav-pesanan" onclick="showPage('pesanan')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      Pesanan
    </div>

    <div class="sidebar-footer">
      <div class="label">Tahun ajaran</div>
      <div class="value">2024 / 2025</div>
    </div>
  </aside>

  <div style="flex:1; display:flex; flex-direction:column; min-height:100vh;">

    <div class="topbar no-print">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:12px; color:#9ca3af;" id="topbar-date"></span>
        <div class="badge">Aktif</div>
      </div>
    </div>

    <div style="flex:1; padding:1.25rem 1.5rem;">

      <div class="page active" id="dashboardPage">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total data</div>
            <div class="stat-value" id="totalData">0</div>
            <div class="stat-sub">semua pemesan</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total pesanan</div>
            <div class="stat-value" id="totalJumlah">0</div>
            <div class="stat-sub">total porsi</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Hari ini</div>
            <div class="stat-value" id="hariIni">0</div>
            <div class="stat-sub">pesanan hari ini</div>
          </div>
        </div>

        <div class="table-card">
          <div class="card-header p-4 border-b">
            <div class="font-bold text-sm">Pesanan terbaru</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Nama</th>
                <th>Pesanan</th>
                <th>Jumlah</th>
              </tr>
            </thead>
            <tbody id="recentTable"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="pesananPage">
        <div class="table-card">
          <div class="table-toolbar no-print">
            <div class="search-wrap">
              <input id="searchInput" placeholder="Cari nama..." oninput="renderTable()">
            </div>
            <div class="btn-toolbar">
              <button class="btn" onclick="window.print()">Print</button>
              <button class="btn btn-danger" onclick="exportPDF()">PDF</button>
              <button class="btn btn-success" onclick="exportExcel()">Excel</button>
              <button class="btn btn-primary" onclick="tambahData()">+ Tambah</button>
            </div>
          </div>

          <table id="mainTable">
            <thead>
              <tr>
                <th style="width:45px;">No</th>
                <th>Tanggal</th>
                <th>Nama</th>
                <th>Pesanan</th>
                <th>Jumlah</th>
                <th style="width:90px;" class="no-print">Aksi</th>
              </tr>
            </thead>
            <tbody id="tableData"></tbody>
          </table>

          <div class="pagination no-print">
            <span id="paginationInfo" style="font-size: 12px; color: #6b7280;"></span>
            <div class="page-btns" id="paginationBtns"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal-overlay" id="modalForm">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title font-bold" id="modalTitle">Tambah Pesanan</div>
      <button class="text-gray-400 text-xl" onclick="tutupModal()">&times;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Tanggal</label>
      <input id="formTanggal" type="date" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Nama</label>
      <input id="formNama" type="text" class="form-input" placeholder="Nama pemesan">
    </div>
    <div class="form-group">
      <label class="form-label">Pesanan</label>
      <input id="formPesanan" type="text" class="form-input" placeholder="Menu makanan">
    </div>
    <div class="form-group">
      <label class="form-label">Jumlah</label>
      <input id="formJumlah" type="number" class="form-input" placeholder="0">
    </div>
    <div class="modal-footer flex justify-end gap-2 mt-4">
      <button class="btn" onclick="tutupModal()">Batal</button>
      <button class="btn btn-primary" onclick="simpanForm()">Simpan</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
