<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBG Dashboard - Laporan Terfilter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: #1a56db; min-height: 100vh; padding: 1.5rem 1rem; display: flex; flex-direction: column; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; padding: 0 0.5rem; }
    .logo-icon { width: 34px; height: 34px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; fill: white; }
    .sidebar-logo span { font-size: 17px; font-weight: 600; color: white; }
    .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); padding: 0 0.75rem; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.75); font-size: 14px; transition: background 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.12); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.2); color: white; font-weight: 600; }
    
    /* TOPBAR */
    .topbar { background: white; border-bottom: 1px solid #e5e7eb; padding: 0.875rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-size: 15px; font-weight: 600; color: #111827; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.25rem; }
    .stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; }
    .stat-value { font-size: 28px; font-weight: 700; color: #111827; }

    /* TABLE */
    .table-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .table-toolbar { padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .search-wrap { display: flex; align-items: center; gap: 6px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 7px; padding: 0 10px; flex: 1; max-width: 240px; }
    .search-wrap input { border: none; background: transparent; font-size: 13px; padding: 7px 0; outline: none; width: 100%; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 0.45rem 0.875rem; border-radius: 7px; font-size: 13px; cursor: pointer; border: 1px solid #d1d5db; background: white; transition: 0.2s; }
    .btn-primary { background: #1a56db; color: white; border: none; }
    .btn-danger { background: #dc2626; color: white; border: none; }
    .btn-success { background: #059669; color: white; border: none; }

    /* ACTION ICONS */
    .action-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; transition: 0.2s; }
    .btn-edit-icon { color: #1a56db; background: #eff6ff; }
    .btn-edit-icon:hover { background: #dbeafe; }
    .btn-delete-icon { color: #dc2626; background: #fef2f2; }
    .btn-delete-icon:hover { background: #fee2e2; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 0.75rem 1rem; background: #f9fafb; color: #6b7280; text-transform: uppercase; font-size: 11px; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid #f3f4f6; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 1.5rem; width: 400px; }
    
    .page { display: none; }
    .page.active { display: block; }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>

<div style="display:flex;">
  <aside class="sidebar no-print">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div>
      <span>MBG App</span>
    </div>
    <div class="nav-label">Menu Utama</div>
    <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">Dashboard</div>
    <div class="nav-item" id="nav-pesanan" onclick="showPage('pesanan')">Data Pesanan</div>
  </aside>

  <div style="flex:1; display:flex; flex-direction:column;">
    <div class="topbar no-print">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div id="topbar-date" style="font-size: 12px; color: #6b7280;"></div>
    </div>

    <main style="padding: 1.5rem;">
      <div class="page active" id="dashboardPage">
        <div class="stats-grid">
          <div class="stat-card">
            <div style="color:#6b7280; font-size:12px;">Total Data</div>
            <div class="stat-value" id="stat-total-mbg">0</div>
          </div>
          <div class="stat-card">
            <div style="color:#6b7280; font-size:12px;">Total Porsi</div>
            <div class="stat-value" id="stat-total-porsi">0</div>
          </div>
          <div class="stat-card">
            <div style="color:#6b7280; font-size:12px;">Pesanan Hari Ini</div>
            <div class="stat-value" id="stat-hari-ini">0</div>
          </div>
        </div>
        <div class="table-card">
            <div style="padding:1rem; font-weight:bold; border-bottom:1px solid #eee;">5 Pesanan Terakhir</div>
            <table>
                <thead><tr><th>Tanggal</th><th>Nama MBG</th><th>Pesanan</th><th>Jumlah</th></tr></thead>
                <tbody id="recentTable"></tbody>
            </table>
        </div>
      </div>

      <div class="page" id="pesananPage">
        <div class="table-card">
          <div class="table-toolbar no-print">
            <div class="search-wrap">
              <input id="searchInput" placeholder="Cari Nama MBG (Contoh: Sukabumi)..." oninput="renderTable()">
            </div>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-danger" onclick="exportPDF()">PDF</button>
              <button class="btn btn-success" onclick="exportExcel()">Excel</button>
              <button class="btn btn-primary" onclick="tambahData()">+ Tambah Data</button>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Nama MBG</th>
                <th>Pesanan</th>
                <th>Jumlah</th>
                <th class="no-print" style="text-align:center;">Aksi</th>
              </tr>
            </thead>
            <tbody id="tableData"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="modalForm">
  <div class="modal">
    <h3 id="modalTitle" style="font-weight:bold; margin-bottom:1rem;">Tambah Pesanan</h3>
    <div style="display:grid; gap:10px;">
      <input type="date" id="formTanggal" class="w-full p-2 border rounded text-sm">
      <input type="text" id="formNama" placeholder="Nama MBG (Contoh: MBG Sukabumi)" class="w-full p-2 border rounded text-sm">
      <input type="text" id="formPesanan" placeholder="Menu Pesanan" class="w-full p-2 border rounded text-sm">
      <input type="number" id="formJumlah" placeholder="Jumlah Porsi" class="w-full p-2 border rounded text-sm">
    </div>
    <div style="display:flex; justify-content:end; gap:8px; margin-top:1.5rem;">
      <button class="btn" onclick="tutupModal()">Batal</button>
      <button class="btn btn-primary" onclick="simpanForm()">Simpan Data</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
